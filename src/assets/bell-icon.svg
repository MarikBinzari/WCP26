<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- White rounded square container -->
  <rect x="2" y="2" width="40" height="40" rx="11" fill="white" filter="url(#sh)"/>

  <!-- Handle -->
  <line x1="22" y1="11" x2="22" y2="13.5" stroke="#0A2E8A" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Bell arch -->
  <path d="M13 27 L13 22 C13 16 17.5 13.5 22 13.5 C26.5 13.5 31 16 31 22 L31 27"
    stroke="#0A2E8A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom rim bar -->
  <line x1="11" y1="27" x2="33" y2="27" stroke="#0A2E8A" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Clapper -->
  <circle cx="22" cy="30.5" r="2.2" fill="#0A2E8A"/>

  <!-- Red badge – white border then red fill -->
  <circle cx="31.5" cy="12.5" r="6" fill="white"/>
  <circle cx="31.5" cy="12.5" r="4.8" fill="#C8102E"/>
</svg>
