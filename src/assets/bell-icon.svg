<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- White rounded square container -->
  <rect x="2" y="2" width="40" height="40" rx="11" fill="white" filter="url(#sh)"/>

  <!-- Lucide bell paths, scaled and centered in the 44x44 space -->
  <g transform="translate(9, 7) scale(1.1)" stroke="#0A2E8A" stroke-width="1.55"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
  </g>

  <!-- Red badge – white ring then red fill -->
  <circle cx="31.5" cy="13" r="5.5" fill="white"/>
  <circle cx="31.5" cy="13" r="4.5" fill="#C8102E"/>
</svg>
